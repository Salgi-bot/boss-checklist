<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사업승인 체크 Beta | EYEPOP</title>
<style>
:root {
  --ci-blue: #3D7CC5;
  --ci-green: #6B8A28;
  --ci-gray: #888888;
  --ci-blue-light: #EBF3FC;
  --ci-green-light: #F2F6E8;
  --bg-target: #EBF3FC;
  --bg-hold: #FFF8EC;
  --bg-non: #F8F8F8;
  --red-mark: #CC0000;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Malgun Gothic', '맑은 고딕', -apple-system, sans-serif;
  font-size: 13px;
  background: #f0f4f8;
  color: #222;
}
#layout {
  display: flex;
  min-height: 100vh;
}
/* ── SIDEBAR ── */
#sidebar {
  width: 300px;
  min-width: 300px;
  background: #fff;
  border-right: 1px solid #dde4f0;
  padding: 16px 14px;
  overflow-y: auto;
  position: sticky;
  top: 0;
  height: 100vh;
}
#sidebar h3 {
  font-size: 14px;
  color: var(--ci-blue);
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 2px solid var(--ci-blue);
}
.form-group { margin-bottom: 10px; }
.form-group label {
  display: block;
  font-size: 11.5px;
  color: #555;
  margin-bottom: 3px;
  font-weight: 600;
}
.form-group input[type=text],
.form-group input[type=number],
.form-group select {
  width: 100%;
  padding: 6px 8px;
  border: 1px solid #ccd5e0;
  border-radius: 5px;
  font-size: 12.5px;
  font-family: inherit;
  background: #fafcff;
  transition: border-color 0.2s;
}
.form-group input:focus,
.form-group select:focus {
  border-color: var(--ci-blue);
  outline: none;
  background: #fff;
}
.form-group input[disabled] {
  background: #f0f4f8;
  color: #666;
  cursor: not-allowed;
}
.row-2 { display: flex; gap: 8px; }
.row-2 .form-group { flex: 1; }
hr.divider {
  border: none;
  border-top: 1px solid #dde4f0;
  margin: 12px 0;
}
.usage-wrap {
  background: #fafcff;
  border: 1px solid #ccd5e0;
  border-radius: 5px;
  padding: 8px;
  max-height: 180px;
  overflow-y: auto;
  font-size: 12px;
}
.usage-wrap label {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 2px 0;
  cursor: pointer;
  font-weight: normal !important;
  color: #333;
}
.usage-wrap input[type=checkbox] { margin: 0; cursor: pointer; }
.btn-row { display: flex; gap: 8px; margin-top: 14px; }
.btn {
  flex: 1;
  padding: 9px 0;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  font-family: inherit;
  font-weight: bold;
  cursor: pointer;
  transition: filter 0.15s;
}
.btn:hover { filter: brightness(0.92); }
.btn-reset { background: #e8ecf2; color: #444; }
.btn-run {
  background: linear-gradient(135deg, var(--ci-blue) 0%, #2D6CB5 100%);
  color: white;
}
.btn-print {
  background: linear-gradient(135deg, #6B8A28 0%, #5a7a20 100%);
  color: white;
  width: 100%;
  margin-top: 8px;
  padding: 9px 0;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  font-family: inherit;
  font-weight: bold;
  cursor: pointer;
  display: none;
}
.btn-print:hover { filter: brightness(0.92); }
.today-label {
  font-size: 11.5px;
  color: var(--ci-blue);
  font-weight: bold;
  margin-bottom: 10px;
}

/* ── MAIN ── */
#main {
  flex: 1;
  padding: 20px 24px;
  overflow-x: auto;
}
.brand-header {
  background: linear-gradient(135deg, #3D7CC5 0%, #2D6CB5 100%);
  color: white;
  padding: 14px 24px;
  border-radius: 8px;
  margin-bottom: 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 2px 8px rgba(61,124,197,0.25);
}
.brand-header .title { font-size: 20px; font-weight: bold; letter-spacing: -0.5px; }
.brand-header .subtitle { font-size: 12px; opacity: 0.85; margin-top: 3px; }
.brand-header .version-badge {
  background: rgba(255,255,255,0.2);
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: bold;
  border: 1px solid rgba(255,255,255,0.4);
}
/* info panel */
.info-panel {
  background: linear-gradient(135deg, #EBF3FC 0%, #F2F6E8 100%);
  border-left: 4px solid #3D7CC5;
  padding: 16px 20px;
  border-radius: 8px;
  margin-bottom: 16px;
}
.info-panel .panel-title {
  color: #3D7CC5;
  font-size: 15px;
  font-weight: bold;
  margin-bottom: 10px;
}
.info-panel table { width: 100%; border-collapse: collapse; font-size: 13px; }
.info-panel td { padding: 4px 8px; }
.info-panel .lbl { color: #555; width: 18%; font-weight: 500; }
.info-panel .val { font-weight: bold; color: #222; }
/* summary bar */
.summary-bar { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
.summary-chip {
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: bold;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.chip-target { background: #3D7CC5; color: white; }
.chip-non    { background: #888888; color: white; }
.chip-hold   { background: #E07B00; color: white; }
.chip-fix    { background: #CC0000; color: white; }
/* table */
.checklist-table {
  width: 100%;
  border-collapse: collapse;
  font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
  margin-top: 10px;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  font-size: 12.5px;
}
.checklist-table th {
  background: #3D7CC5;
  color: white;
  padding: 10px 8px;
  text-align: center;
  font-size: 13px;
  font-weight: bold;
  border: 1px solid #2D6CB5;
}
.checklist-table td {
  padding: 8px 10px;
  border: 1px solid #D0D9E8;
  vertical-align: top;
  line-height: 1.55;
}
.checklist-table tr:hover td { filter: brightness(0.96); }
.checklist-table.daejeon th { background: #6B8A28; border-color: #5A7A20; }
.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: bold;
  white-space: nowrap;
}
.badge-target { background: #3D7CC5; color: white; }
.badge-hold   { background: #E07B00; color: white; }
.badge-non    { background: #888888; color: white; }
.badge-hold-changed { background: #E07B00; color: white; border: 2px solid #FFD600; }
.corrected-name { color: inherit; font-weight: 500; }
.corrected-law  { color: var(--ci-blue); font-weight: bold; }
.daejeon-header {
  background: #6B8A28;
  color: white;
  padding: 10px 16px;
  border-radius: 6px;
  font-size: 15px;
  font-weight: bold;
  margin: 20px 0 8px;
}
#results { display: none; }
#placeholder {
  text-align: center;
  padding: 80px 20px;
  color: #888;
  font-size: 15px;
  background: white;
  border-radius: 8px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
#placeholder .icon { font-size: 48px; margin-bottom: 12px; }
/* copyright footer */
#copyright-footer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(255,255,255,0.92);
  border-top: 1px solid #ddd;
  text-align: center;
  padding: 5px 0;
  font-size: 11px;
  color: #888;
  z-index: 9999;
  pointer-events: none;
}
/* ── 섹션 타이틀 ── */
.section-title {
  font-size: 10.5px;
  font-weight: bold;
  color: var(--ci-blue);
  background: var(--ci-blue-light);
  padding: 3px 8px;
  border-radius: 3px;
  margin: 0 0 8px;
  letter-spacing: 0.2px;
}
/* ── 비고 접기 ── */
.note-content {
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.note-content.expanded {
  display: block;
  overflow: visible;
}
.note-toggle {
  color: var(--ci-blue);
  cursor: pointer;
  font-size: 11px;
  margin-top: 2px;
  display: inline-block;
  background: none;
  border: none;
  padding: 0;
  font-family: inherit;
}
.note-toggle:hover { opacity: 0.7; }
/* ── 반응형 ── */
@media (max-width: 900px) {
  #layout { flex-direction: column; }
  #sidebar {
    width: 100%;
    min-width: unset;
    height: auto;
    position: static;
    border-right: none;
    border-bottom: 1px solid #dde4f0;
    max-height: 60vh;
    overflow-y: auto;
  }
  #main { padding: 12px 8px; }
  .checklist-table { font-size: 11px; }
  .checklist-table th, .checklist-table td { padding: 6px 5px; }
  .brand-header .subtitle { font-size: 11px; }
}
/* ── PRINT ── */
@media print {
  body { background: white; font-size: 11px; }
  #sidebar, #copyright-footer, .btn-row, .btn-print { display: none !important; }
  #layout { display: block; }
  #main { padding: 10px; }
  #results { display: block !important; }
  #placeholder { display: none !important; }
  .checklist-table { font-size: 10px; }
  .checklist-table th, .checklist-table td { padding: 5px 6px; }
  .brand-header { box-shadow: none; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .summary-bar .summary-chip { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .badge { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  tr { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
</style>
</head>
<body>

<div id="layout">
<!-- ── SIDEBAR ── -->
<div id="sidebar">
  <h3>📝 기본 정보 입력</h3>
  <div class="today-label" id="today-label"></div>

  <div class="form-group">
    <label>용역명</label>
    <input type="text" id="p_name" value="신규 개발사업 프로젝트">
  </div>
  <div class="form-group">
    <label>주소</label>
    <input type="text" id="address" value="대전광역시 서구 월드컵대로484번안길 10, 3층">
  </div>
  <div class="form-group">
    <label>총공사비</label>
    <select id="cost_opt">
      <option value="50억원 미만">50억원 미만</option>
      <option value="50억원 이상" selected>50억원 이상</option>
    </select>
  </div>

  <hr class="divider">
  <div class="section-title">📐 면적 / 규모</div>
  <div class="row-2">
    <div class="form-group"><label>대지면적(㎡)</label><input type="number" id="land_area" value="10000"></div>
    <div class="form-group"><label>연면적(㎡) <span style="font-size:10px;color:#888;">전체</span></label><input type="number" id="total_area" value="50000"></div>
  </div>
  <div class="form-group">
    <label>단일동 최대 연면적 <span style="font-size:10px;color:#888;">동별 산정 항목 적용</span></label>
    <select id="unit_area">
      <option value="499">500㎡ 미만</option>
      <option value="999">500㎡ 이상 ~ 1,000㎡ 미만</option>
      <option value="50000">1,000㎡ 이상 ~ 10만㎡ 미만</option>
      <option value="100000" selected>10만㎡ 이상</option>
    </select>
  </div>
  <div class="form-group"><label>지하층 연면적(㎡)</label><input type="number" id="under_area" value="10000"></div>
  <div class="form-group"><label>지상층 연면적(㎡)</label><input type="text" id="above_area_disp" disabled></div>
  <div class="form-group"><label>주차장(기계실) 면적(㎡)</label><input type="number" id="parking" value="10000"></div>
  <div class="form-group"><label>비주거 산정 연면적(㎡)</label><input type="text" id="excl_area_disp" disabled></div>
  <div class="row-2">
    <div class="form-group"><label>건폐율(%)</label><input type="number" id="build_coverage" value="60"></div>
    <div class="form-group"><label>용적률(%)</label><input type="number" id="floor_area_ratio" value="250"></div>
  </div>
  <div class="form-group"><label>건축면적(㎡)</label><input type="number" id="arch_area" value="3000"></div>

  <hr class="divider">
  <div class="section-title">🏗️ 건물 정보</div>
  <div class="row-2">
    <div class="form-group"><label>지하층수</label><select id="b_floors">
      <option value="0">없음</option>
      <option value="2" selected>있음</option>
    </select></div>
    <div class="form-group"><label>지상층수</label><input type="number" id="g_floors" value="20"></div>
  </div>
  <div class="row-2">
    <div class="form-group"><label>최고높이(m)</label><input type="number" id="max_h" value="60" step="0.1"></div>
    <div class="form-group"><label>굴착깊이</label><select id="depth">
      <option value="5">10m 미만</option>
      <option value="15" selected>10m 이상 ~ 20m 미만</option>
      <option value="25">20m 이상</option>
    </select></div>
  </div>
  <div class="form-group"><label>평면형태</label><select id="plan_type">
    <option value="규칙형" selected>규칙형</option>
    <option value="불규칙형">불규칙형 (비대칭·복잡형)</option>
  </select></div>
  <div class="form-group"><label>세대수</label><input type="number" id="households" value="500"></div>

  <hr class="divider">
  <div class="section-title">🌍 주변 환경 / 조건</div>
  <div class="form-group">
    <label>교육시설</label>
    <select id="edu">
      <option value="해당없음">해당없음</option>
      <option value="200m 이내 존재">200m 이내 존재</option>
    </select>
  </div>
  <div class="form-group">
    <label>문화재 시설</label>
    <select id="heritage">
      <option value="해당없음">해당없음</option>
      <option value="200m 이내">200m 이내</option>
    </select>
  </div>
  <div class="form-group">
    <label>경관지구</label>
    <select id="landsc">
      <option value="해당없음">해당없음</option>
      <option value="해당">해당</option>
    </select>
  </div>
  <div class="form-group">
    <label>지하연계 복합건축</label>
    <select id="under_link">
      <option value="해당없음">해당없음</option>
      <option value="해당">해당</option>
    </select>
  </div>
  <div class="form-group">
    <label>용도지역 구분 <small style="font-weight:normal;color:#888">(국토계획법)</small></label>
    <select id="urban">
      <option value="도시지역">도시지역 (주거·상업·공업·녹지)</option>
      <option value="도시외지역">비도시지역 (관리·농림·자연환경보전)</option>
    </select>
  </div>
  <div class="form-group"><label>철도이격거리</label><select id="rail">
    <option value="0" selected>해당없음</option>
    <option value="15">30m 이내</option>
    <option value="100">30m 초과</option>
  </select></div>
  <div class="form-group">
    <label>공공기관 여부</label>
    <select id="public_inst">
      <option value="민간">민간</option>
      <option value="공공기관">공공기관</option>
    </select>
  </div>

  <hr class="divider">
  <div class="section-title">🏢 용도 선택 (복수 가능)</div>
  <div class="form-group">
    <label>용도 (복수 선택)</label>
    <div class="usage-wrap" id="usage-wrap">
      <label><input type="checkbox" class="usage-cb" value="공동주택(아파트)" checked> 공동주택(아파트)</label>
      <label><input type="checkbox" class="usage-cb" value="주상복합"> 주상복합</label>
      <label><input type="checkbox" class="usage-cb" value="오피스텔"> 오피스텔</label>
      <label><input type="checkbox" class="usage-cb" value="다가구주택"> 다가구주택</label>
      <label><input type="checkbox" class="usage-cb" value="연립주택 및 다세대주택"> 연립주택 및 다세대주택</label>
      <label><input type="checkbox" class="usage-cb" value="제1종 근린생활시설(일용품 소매점)"> 제1종 근린생활시설(일용품 소매점)</label>
      <label><input type="checkbox" class="usage-cb" value="제2종 근린생활시설(다중생활시설)"> 제2종 근린생활시설(다중생활시설)</label>
      <label><input type="checkbox" class="usage-cb" value="문화 및 집회시설(동·식물원 제외)"> 문화 및 집회시설(동·식물원 제외)</label>
      <label><input type="checkbox" class="usage-cb" value="교육연구시설(연구소·도서관 제외)"> 교육연구시설(연구소·도서관 제외)</label>
      <label><input type="checkbox" class="usage-cb" value="노유자시설"> 노유자시설</label>
      <label><input type="checkbox" class="usage-cb" value="수련시설"> 수련시설</label>
      <label><input type="checkbox" class="usage-cb" value="업무시설"> 업무시설</label>
      <label><input type="checkbox" class="usage-cb" value="신축 공공건축물/교통수단·여객시설"> 신축 공공건축물/교통수단·여객시설</label>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-reset" onclick="resetForm()">🔄 초기화</button>
    <button class="btn btn-run" onclick="analyze()">🔍 분석 실행</button>
  </div>
  <div class="btn-row" style="margin-top:6px;">
    <button class="btn" style="background:#059669;color:#fff;flex:1;" onclick="saveData()">💾 저장 (.json)</button>
    <button class="btn" style="background:#7c3aed;color:#fff;flex:1;" onclick="document.getElementById('load-input').click()">📂 불러오기</button>
    <input type="file" id="load-input" accept=".json" style="display:none" onchange="loadData(this)">
  </div>
  <button class="btn-print" id="btn-print" onclick="window.print()">🖨️ PDF 저장 (인쇄)</button>
</div>

<!-- ── MAIN ── -->
<div id="main">
  <div class="brand-header">
    <div>
      <div class="title">🏗️ 사업승인 체크리스트</div>
      <div class="subtitle">(주)아이팝엔지니어링 (EYEPOP Engineering) &nbsp;|&nbsp; 최종수정 2026-04-03 &nbsp;|&nbsp; 법적 근거 전면 검토 반영</div>
    </div>
    <div class="version-badge">Web Beta</div>
  </div>

  <div id="placeholder">
    <div class="icon">🏗️</div>
    <div>좌측 <strong>[🔍 분석 실행]</strong> 버튼을 누르시면<br>43개 항목 분석 결과가 여기에 출력됩니다.<br><span style="font-size:12px;color:#aaa;">(대전광역시 주소 입력 시 특화 조례 최대 +3건 추가)</span></div>
  </div>

  <div id="results">
    <div id="info-panel-html"></div>
    <div id="summary-bar-html"></div>
    <div id="table-html"></div>
    <div id="daejeon-html"></div>
  </div>
</div>
</div>

<div id="copyright-footer"></div>

<script>
// ── 저장 / 불러오기 ──
function saveData() {
  const fields = ['p_name','address','cost_opt','land_area','total_area','unit_area','under_area',
    'parking','build_coverage','floor_area_ratio','arch_area','b_floors','g_floors',
    'max_h','plan_type','depth','households','edu','heritage','landsc','under_link','urban','rail','public_inst'];
  const data = { _ver: 1, _saved: new Date().toISOString() };
  fields.forEach(id => {
    const el = document.getElementById(id);
    if (el) data[id] = el.value;
  });
  data.usages = Array.from(document.querySelectorAll('.usage-cb'))
    .filter(cb => cb.checked).map(cb => cb.value);
  const pName = (data.p_name || '사업승인').replace(/[/\\:*?"<>|]/g, '_');
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `사업승인체크_${pName}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function loadData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      const fields = ['p_name','address','cost_opt','land_area','total_area','unit_area','under_area',
        'parking','build_coverage','floor_area_ratio','arch_area','b_floors','g_floors',
        'max_h','plan_type','depth','households','edu','heritage','landsc','under_link','urban','rail','public_inst'];
      fields.forEach(id => {
        const el = document.getElementById(id);
        if (el && data[id] !== undefined) el.value = data[id];
      });
      if (Array.isArray(data.usages)) {
        document.querySelectorAll('.usage-cb').forEach(cb => {
          cb.checked = data.usages.includes(cb.value);
        });
      }
      updateDerived();
      analyze();
    } catch(err) {
      alert('파일을 읽을 수 없습니다: ' + err.message);
    }
    input.value = '';
  };
  reader.readAsText(file);
}

function updateDerived() {
  const T = parseFloat(document.getElementById('total_area').value) || 0;
  const U = parseFloat(document.getElementById('under_area').value) || 0;
  const P = parseFloat(document.getElementById('parking').value) || 0;
  document.getElementById('above_area_disp').value = fmt(T - U);
  document.getElementById('excl_area_disp').value = fmt(T - P);
}
['total_area','under_area','parking'].forEach(id => {
  document.getElementById(id).addEventListener('input', updateDerived);
});
updateDerived();

function fmt(n) { return Math.round(n).toLocaleString('ko-KR'); }

      const ia = noCat[a.no] ? catIdx[noCat[a.no].name] : 99;
      const ib = noCat[b.no] ? catIdx[noCat[b.no].name] : 99;
      return ia !== ib ? ia - ib : a.no - b.no;

    const html = []; let prevCat = null;
    for (const r of sorted) {
      const cat = noCat[r.no] || { name: '기타', icon: '📋' };

          gc.non    ? `<span style="color:#888;">✕ ${gc.non}건</span>` : ''
        ].filter(Boolean).join(' &nbsp;');
        html.push(`<tr><td colspan="6" style="background:#E8EEF7;padding:7px 14px;font-weight:bold;font-size:13px;color:#2B527A;border-left:4px solid #3D7CC5;border-top:2px solid #B8CCE4;">${cat.icon} ${cat.name} <span style="font-weight:normal;font-size:11px;color:#666;margin-left:8px;">${grp.length}개 항목 &nbsp;${badges}</span></td></tr>`);
        prevCat = cat;
      }
      html.push(makeRow(r));
    }
    return html.join('');
  }

  const header_row = `<tr>
    <th style="width:42px;">No</th>
    <th style="width:190px;">분석 항목</th>
    <th style="width:88px;">결과</th>
    <th style="width:125px;">제출시기</th>
    <th style="width:180px;">법적 근거</th>
    <th>비고</th>
  </tr>`;

  // ── 기본 정보 패널 ──
  document.getElementById('info-panel-html').innerHTML = `
    <div class="info-panel">
    <div class="panel-title">📋 기본 정보</div>
    <table>
    <tr><td class="lbl">📅 작성일</td><td class="val">${today_str}</td>
        <td class="lbl">🏗️ 용역명</td><td class="val">${escHtml(p_name)}</td></tr>
    <tr><td class="lbl">📍 주소</td><td class="val" colspan="3">${escHtml(address)}</td></tr>
    <tr><td class="lbl">💰 총공사비</td><td class="val">${cost_opt}</td>
        <td class="lbl">👥 세대수</td><td class="val">${HH.toLocaleString()}세대</td></tr>
    <tr><td class="lbl">🏠 대지면적</td><td class="val">${L.toLocaleString()}㎡</td>
        <td class="lbl">🏢 연면적</td><td class="val">${T.toLocaleString()}㎡</td></tr>
    <tr><td class="lbl">⬇️ 지하층 연면적</td><td class="val">${U.toLocaleString()}㎡</td>
        <td class="lbl">⬆️ 지상층 연면적</td><td class="val">${above_area.toLocaleString()}㎡</td></tr>
    <tr><td class="lbl">📊 건폐율/용적률</td><td class="val">${build_coverage}% / ${floor_area_ratio}%</td>
        <td class="lbl">📐 건축면적</td><td class="val">${arch_area.toLocaleString()}㎡</td></tr>
    <tr><td class="lbl">🏗️ 층수</td><td class="val">지하${BF}층 / 지상${GF}층 (총${TF}층)</td>
        <td class="lbl">📏 최고높이 / 굴착</td><td class="val">${H}m / ${depth_lbl}</td></tr>
    <tr><td class="lbl">🏛️ 용도</td><td class="val" colspan="3">${escHtml(usages_str)}</td></tr>
    </table></div>`;

  // ── 요약 배지 ──
  document.getElementById('summary-bar-html').innerHTML = `
    <div class="summary-bar">
      <span class="summary-chip chip-target">● 대상 ${cnts.target}건</span>
      <span class="summary-chip chip-non">✕ 비대상 ${cnts.non}건</span>
      <span class="summary-chip chip-hold">▲ 유보 ${cnts.hold}건</span>
    </div>`;

  // ── 메인 테이블 ──
  document.getElementById('table-html').innerHTML = `
    <table class="checklist-table">
      <thead>${header_row}</thead>
      <tbody>${makeRows(display_data)}</tbody>
    </table>`;

  // ── 대전 특화 ──
  if (is_daejeon && daejeon_display.length > 0) {
    document.getElementById('daejeon-html').innerHTML = `
      <div class="daejeon-header">🏙️ 대전광역시 특화 조례 항목</div>
      <table class="checklist-table daejeon">
        <thead>${header_row}</thead>
        <tbody>${makeRows(daejeon_display)}</tbody>
      </table>`;
  } else {
    document.getElementById('daejeon-html').innerHTML = '';
  }

  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('results').style.display = 'block';
  document.getElementById('btn-print').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleNote(id, btn) {
  const el = document.getElementById(id);
  if (el.classList.contains('expanded')) {
    el.classList.remove('expanded');
    btn.textContent = '더보기 ▼';
  } else {
    el.classList.add('expanded');
    btn.textContent = '접기 ▲';
  }
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
</body>
</html>
